<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="theme-color" content="#4f7c5f"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Sage"/>
  <title>Sage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{background:#faf9f7;font-family:'DM Sans',sans-serif;height:100dvh;display:flex;align-items:center;justify-content:center;}
    #root{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}

    /* Welcome */
    .welcome{text-align:center;padding:32px 24px;max-width:380px;}
    .logo-mark{font-size:32px;color:#4f7c5f;display:block;margin-bottom:24px;letter-spacing:2px;}
    .welcome h1{font-family:'Lora',serif;font-size:28px;font-weight:400;color:#1c1c1c;margin-bottom:12px;letter-spacing:-0.5px;}
    .welcome p{font-size:16px;color:#6b7280;line-height:1.6;margin-bottom:36px;font-weight:300;}
    .begin-btn{background:#1c1c1c;color:#fff;border:none;border-radius:100px;padding:14px 32px;font-size:15px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;}

    /* Mood */
    .mood-wrap{text-align:center;padding:32px 24px;max-width:420px;width:100%;}
    .mood-prompt{font-family:'Lora',serif;font-size:22px;color:#1c1c1c;margin-bottom:28px;font-weight:400;font-style:italic;}
    .mood-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
    .mood-btn{background:transparent;border:1px solid;border-radius:14px;padding:16px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;font-family:'DM Sans',sans-serif;transition:background 0.2s;}
    .mood-emoji{font-size:26px;}
    .mood-label{font-size:13px;font-weight:500;}

    /* Chat */
    .chat-container{width:100%;max-width:620px;background:#fff;border-radius:20px;box-shadow:0 4px 40px rgba(0,0,0,0.06);display:flex;flex-direction:column;overflow:hidden;height:92dvh;border:1px solid #f0ede8;}
    .chat-header{padding:14px 18px;border-bottom:1px solid #f0ede8;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .header-left{display:flex;align-items:center;gap:12px;}
    .sage-avatar{width:36px;height:36px;border-radius:50%;background:#4f7c5f;color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-family:'Lora',serif;font-weight:500;}
    .sage-name{font-family:'Lora',serif;font-size:15px;font-weight:500;color:#1c1c1c;}
    .sage-role{font-size:12px;color:#9ca3af;font-weight:300;}
    .header-right{display:flex;align-items:center;gap:10px;}
    .mood-badge{font-size:12px;color:#6b7280;background:#f9fafb;border-radius:100px;padding:4px 10px;border:1px solid #f0ede8;}
    .timer{font-size:12px;color:#9ca3af;font-variant-numeric:tabular-nums;min-width:32px;}

    .messages-area{flex:1;overflow-y:auto;padding:20px 16px 8px;display:flex;flex-direction:column;gap:16px;}
    .messages-area::-webkit-scrollbar{width:4px;}
    .messages-area::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:2px;}

    .assistant-row{display:flex;align-items:flex-start;gap:10px;max-width:90%;}
    .user-row{display:flex;justify-content:flex-end;}
    .avatar-small{width:28px;height:28px;min-width:28px;border-radius:50%;background:#4f7c5f;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-family:'Lora',serif;font-weight:500;margin-top:2px;}
    .assistant-bubble{background:#f9f7f4;border-radius:4px 16px 16px 16px;padding:12px 16px;font-size:15px;line-height:1.65;color:#1c1c1c;font-weight:300;flex:1;}
    .user-bubble{background:#1c1c1c;color:#fff;border-radius:16px 4px 16px 16px;padding:12px 16px;font-size:15px;line-height:1.65;max-width:80%;font-weight:300;}

    .typing-indicator{background:#f9f7f4;border-radius:4px 16px 16px 16px;padding:14px 18px;display:flex;gap:5px;align-items:center;}
    .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#9ca3af;animation:pulse 1.4s ease-in-out infinite;}
    @keyframes pulse{0%,80%,100%{transform:scale(0.7);opacity:0.4}40%{transform:scale(1);opacity:1}}

    .input-area{padding:12px 16px;border-top:1px solid #f0ede8;display:flex;gap:10px;align-items:flex-end;flex-shrink:0;}
    #user-input{flex:1;border:1px solid #e5e7eb;border-radius:14px;padding:10px 14px;font-size:15px;font-family:'DM Sans',sans-serif;font-weight:300;color:#1c1c1c;resize:none;line-height:1.5;background:#faf9f7;outline:none;}
    #user-input::placeholder{color:#9ca3af;}
    .send-btn{width:40px;height:40px;border-radius:50%;background:#1c1c1c;color:#fff;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.2s;}
    .hint{text-align:center;font-size:11px;color:#d1d5db;padding:0 0 10px;font-weight:300;}

    @media(max-width:600px){
      .chat-container{border-radius:0;height:100dvh;border:none;}
    }
  </style>
</head>
<body>
<div id="root"></div>

<script>
const SYSTEM_PROMPT = `You are a warm, insightful executive coach named Sage. You are coaching Jim Juliano, AVP of Data & Analytics at Berkshire Group, a multifamily real estate investment firm in Massachusetts where he has worked for 29 years.

About Jim:
- Leads a small team: two data analysts and a business analyst/project manager
- Working on Microsoft Fabric modernization, Power BI reporting, data governance, and AI strategy
- Navigating a complex org with CITO, VP, SVP Infrastructure, VP Applications, and COO
- Prefers hands-on, impact-visible work over people management
- Values fit and meaning over compensation
- Strengths: Flexibility/Adaptability, Emotional Control
- Development areas: Planning & Prioritization, Goal-Directed Persistence
- Interests: cars (driving experience), travel (discovery, food, culture), art
- Currently managing a direct-report visibility/displacement challenge, working on executive presence with CITO

Coaching philosophy:
- Ask ONE powerful focused question at a time — never multiple
- Be curious, not clinical. Hold space without judgment
- Keep responses to 2-4 sentences max, then one clear question
- Warm, direct prose — no bullets, no clichés, no speeches
- Reflect what you notice before asking
- Rotate naturally between leadership/career, habits/accountability, self-awareness

Begin with a warm 1-2 sentence check-in about what's on Jim's mind today.`;

const MOODS = [
  {label:"Energized", emoji:"⚡", color:"#f59e0b"},
  {label:"Focused",   emoji:"🎯", color:"#3b82f6"},
  {label:"Uncertain", emoji:"🌫️", color:"#8b5cf6"},
  {label:"Drained",   emoji:"🌊", color:"#6b7280"},
  {label:"Motivated", emoji:"🔥", color:"#ef4444"},
  {label:"Reflective",emoji:"🌙", color:"#0ea5e9"},
];

let messages = [];
let sessionSeconds = 0;
let timerInterval = null;
let currentMood = null;

const root = document.getElementById('root');

function render(html){ root.innerHTML = html; }

function showWelcome(){
  render(`
    <div class="welcome">
      <span class="logo-mark">✦</span>
      <h1>Good to see you, Jim.</h1>
      <p>Your space to think clearly, lead well,<br>and stay grounded in what matters.</p>
      <button class="begin-btn" onclick="showMood()">Begin session →</button>
    </div>
  `);
}

function showMood(){
  const btns = MOODS.map(m => `
    <button class="mood-btn" style="border-color:${m.color}60"
      onclick="startSession('${m.label}','${m.emoji}','${m.color}')"
      onmouseenter="this.style.background='${m.color}18'"
      onmouseleave="this.style.background='transparent'">
      <span class="mood-emoji">${m.emoji}</span>
      <span class="mood-label" style="color:${m.color}">${m.label}</span>
    </button>
  `).join('');
  render(`
    <div class="mood-wrap">
      <p class="mood-prompt">How are you arriving today?</p>
      <div class="mood-grid">${btns}</div>
    </div>
  `);
}

async function startSession(label, emoji, color){
  currentMood = {label, emoji, color};
  messages = [];
  sessionSeconds = 0;
  showChat();
  setLoading(true);
  try {
    const moodNote = `(Jim's mood: ${label}. Let it subtly inform your tone — don't name it explicitly.)`;
    const reply = await callAPI([{role:"user", content:"Begin the session."}], moodNote);
    messages.push({role:"assistant", content:reply});
  } catch(e) {
    messages.push({role:"assistant", content:"Something went wrong. Please refresh and try again."});
  }
  setLoading(false);
  renderMessages();
  startTimer();
}

function showChat(){
  root.innerHTML = `
    <div class="chat-container">
      <div class="chat-header">
        <div class="header-left">
          <div class="sage-avatar">S</div>
          <div>
            <div class="sage-name">Sage</div>
            <div class="sage-role">Your coach</div>
          </div>
        </div>
        <div class="header-right">
          <span class="mood-badge" id="mood-badge">${currentMood.emoji} ${currentMood.label}</span>
          <span class="timer" id="timer">0:00</span>
        </div>
      </div>
      <div class="messages-area" id="messages"></div>
      <div class="input-area">
        <textarea id="user-input" rows="2" placeholder="Share what's on your mind…"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" style="opacity:0.35">↑</button>
      </div>
      <p class="hint">Enter to send · Shift+Enter for new line</p>
    </div>
  `;
  const inp = document.getElementById('user-input');
  inp.addEventListener('keydown', e => {
    if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
  });
  inp.addEventListener('input', () => {
    const btn = document.getElementById('send-btn');
    if(btn) btn.style.opacity = inp.value.trim() ? '1' : '0.35';
  });
}

function startTimer(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    sessionSeconds++;
    const el = document.getElementById('timer');
    if(el){
      const m = Math.floor(sessionSeconds/60);
      const s = sessionSeconds % 60;
      el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    }
  }, 1000);
}

function renderMessages(){
  const area = document.getElementById('messages');
  if(!area) return;
  area.innerHTML = messages.map(m => {
    if(m.role === 'assistant') return `
      <div class="assistant-row">
        <div class="avatar-small">S</div>
        <div class="assistant-bubble">${m.content.replace(/\n/g,'<br>')}</div>
      </div>`;
    return `<div class="user-row"><div class="user-bubble">${m.content.replace(/\n/g,'<br>')}</div></div>`;
  }).join('');
  area.scrollTop = area.scrollHeight;
}

function setLoading(on){
  const area = document.getElementById('messages');
  if(!area) return;
  const existing = document.getElementById('typing');
  if(existing) existing.remove();
  if(on){
    const div = document.createElement('div');
    div.id = 'typing';
    div.className = 'assistant-row';
    div.innerHTML = `<div class="avatar-small">S</div><div class="typing-indicator"><span class="dot" style="animation-delay:0ms"></span><span class="dot" style="animation-delay:200ms"></span><span class="dot" style="animation-delay:400ms"></span></div>`;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }
}

async function sendMessage(){
  const inp = document.getElementById('user-input');
  if(!inp || !inp.value.trim()) return;
  const text = inp.value.trim();
  inp.value = '';
  const btn = document.getElementById('send-btn');
  if(btn) btn.style.opacity = '0.35';
  messages.push({role:"user", content:text});
  renderMessages();
  setLoading(true);
  try {
    const reply = await callAPI(messages);
    messages.push({role:"assistant", content:reply});
  } catch {
    messages.push({role:"assistant", content:"Connection hiccup. Please try again."});
  }
  setLoading(false);
  renderMessages();
  inp.focus();
}

async function callAPI(msgs, extraSystem=''){
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      system: SYSTEM_PROMPT + (extraSystem ? '\n\n' + extraSystem : ''),
      messages: msgs,
    })
  });
  const data = await res.json();
  return data.content?.find(b => b.type === 'text')?.text || 'Something went wrong.';
}

showWelcome();
</script>
</body>
</html>
